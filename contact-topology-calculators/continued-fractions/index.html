<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continued fraction calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .result-box {
            background-color: #ffffff;
            border-left: 4px solid #212529;
        }
        .input-label { font-family: monospace; font-size: 1.1rem; }
        #result { line-height: 1.6; }
    </style>
</head>

<body class="py-5">
    <div class="container" style="max-width: 600px;">

        <div class="mb-4">
            <h2 class="fw-bold">Continued fraction calculator</h2>
            <p class="text-secondary small">Enter p and q to find the continued fraction representation.</p>
            <hr>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label for="p" class="form-label input-label">p</label>
                        <input type="number" id="p" class="form-control" value="0">
                    </div>
                    <div class="col-6">
                        <label for="q" class="form-label input-label">q</label>
                        <input type="number" id="q" class="form-control" value="0">
                    </div>
                </div>
                <button id="calc-btn" class="btn btn-dark w-100 py-2 fw-bold">Calculate</button>
            </div>
        </div>

        <div class="result-box p-4 border shadow-sm rounded">
            <h6 class="fw-bold text-secondary mb-3">Result</h6>
            <div id="result" class="font-monospace text-break" style="font-size: 0.95rem;">Enter p and q to calculate.</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        // 1. 함수 이름을 continued_fraction으로 변경
        import init, { continued_fraction } from './pkg/lens_spaces.js';

        async function run() {
            await init();

            const btn = document.getElementById('calc-btn');

            // 엔터키 입력 이벤트
            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault(); 
                        btn.click(); 
                    }
                });
            });

            btn.onclick = () => {
                try {
                    // 입력값을 BigInt로 변환
                    const p = BigInt(document.getElementById('p').value);
                    const q = BigInt(document.getElementById('q').value);

                    // 2. continued_fraction 호출 (결과는 BigInt64Array 또는 Array 형태로 리턴됨)
                    const vec = continued_fraction(p, q);

                    // 3. Vector 요소를 콤마와 공백으로 엮어서 포맷팅
                    const formattedVector = Array.from(vec).join(', ');

                    const targetElement = document.getElementById('result');
                    if (targetElement) {
                        targetElement.innerHTML = `
                            <strong>${p}/${q}</strong> = [ ${formattedVector} ]
                        `;
                    }
                } catch (e) {
                    alert(e);
                }
            };
        }

        run();
    </script>
</body>

</html>
